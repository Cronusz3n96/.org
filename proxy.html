<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;font-family:'Courier New',monospace;}
  #terminal{width:min(600px,90vw);padding:32px;}
  .line{font-size:13px;line-height:1.8;white-space:nowrap;overflow:hidden;}
  .ok{color:#00ff41;}.warn{color:#fbbc05;}.info{color:#4af;}.dim{color:#444;}
  .cursor{display:inline-block;width:8px;height:14px;background:#00ff41;vertical-align:middle;animation:blink .7s step-end infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="terminal"></div>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/uv/bare-mux.js"></script>
<script>
var params = new URLSearchParams(location.search);
var target = params.get('url') || '';
var term = document.getElementById('terminal');
var lines = [
  ['info',  '> initializing chud proxy v6.9.0...'],
  ['ok',    '> loading duckduckgo resolver........... OK'],
  ['ok',    '> loading chud proxy engine............. OK'],
  ['warn',  '> loading stinky balls.................. OK'],
  ['ok',    '> bypassing school firewall............. OK'],
  ['warn',  '> telling securly to shut up............ OK'],
  ['ok',    '> switching to wisp transport........... OK'],
  ['ok',    '> encrypting your search history........ OK'],
  ['info',  '> tunneling through wisp server......... OK'],
  ['ok',    '> deploying chud.exe.................... OK'],
  ['warn',  '> wiping evidence....................... OK'],
  ['ok',    '> connection established'],
  ['dim',   '> navigating to: ' + target],
];
var i = 0;
function addLine(){
  if(i >= lines.length) return;
  var d = document.createElement('div');
  d.className = 'line ' + lines[i][0];
  d.textContent = lines[i][1];
  term.appendChild(d);
  i++;
  if(i < lines.length) setTimeout(addLine, 180);
  else { var c=document.createElement('span'); c.className='cursor'; term.appendChild(c); }
}
addLine();

(async function(){
  if(!navigator.serviceWorker||!target) return;

  function doNav(){
    window.location.replace(__uv$config.prefix + __uv$config.encodeUrl(target));
  }

  // Set up Wisp transport via BareMux
  try {
    const conn = new BareMux.BareMuxConnection('/uv/bare-mux-worker.js');
    await conn.setTransport('/uv/epoxy.js', [{ wisp: location.origin.replace(/^http/, 'ws') + '/wisp/' }]);
  } catch(e) { console.warn('BareMux setup failed:', e); }

  try {
    var reg = await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix, updateViaCache: 'none' });
    if(navigator.serviceWorker.controller){ setTimeout(doNav, lines.length * 180 + 300); return; }
    if(reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    if(reg.installing){
      reg.installing.addEventListener('statechange', function(e){
        if(e.target.state === 'activated') setTimeout(doNav, lines.length * 180 + 300);
      });
    }
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      setTimeout(doNav, lines.length * 180 + 300);
    });
    setTimeout(doNav, lines.length * 180 + 1800);
  } catch(e) {}
})();
</script>
</body>
</html>
